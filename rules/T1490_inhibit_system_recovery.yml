title: Inhibit System Recovery - Volume Shadow Copy Deletion
id: e2b7d541-8c30-49af-96d1-4a0f7c2e6b93
status: experimental
description: |
  Detects deletion of volume shadow copies and backup catalogs, and disabling of Windows
  recovery. Ransomware runs these commands before or during encryption so that victims
  cannot restore files from local snapshots.
references:
  - https://attack.mitre.org/techniques/T1490/
author: Manea Al-Shabrain
date: 2026-07-14
tags:
  - attack.impact
  - attack.t1490
logsource:
  product: windows
  category: process_creation
detection:
  selection_vss:
    Image|endswith:
      - '\vssadmin.exe'
      - '\wmic.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadow'
  selection_vss_resize:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'resize'
      - 'shadowstorage'
  selection_wbadmin:
    Image|endswith: '\wbadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'catalog'
  selection_bcdedit:
    Image|endswith: '\bcdedit.exe'
    CommandLine|contains:
      - 'recoveryenabled no'
      - 'bootstatuspolicy ignoreallfailures'
  condition: 1 of selection_*
fields:
  - User
  - ParentImage
  - CommandLine
falsepositives:
  - Backup software and some administrative maintenance may resize or prune shadow storage. Deletion of ALL shadows plus bcdedit recovery-disable together is almost never legitimate.
level: high
