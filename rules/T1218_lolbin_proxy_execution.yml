title: LOLBin Proxy Execution - certutil / regsvr32 / rundll32
id: 1f9a6c04-3e75-42d8-b1c7-8d2e5a9f0b36
status: experimental
description: |
  Detects abuse of signed, built-in Windows binaries (LOLBins) to download, decode or
  proxy-execute code and bypass application control. Covers certutil download/decode,
  regsvr32 "Squiblydoo" (scriptlet / remote COM), and rundll32 script/URL execution.
  This is a tuned rule: it matches suspicious argument patterns rather than the binaries
  alone, because those binaries also run constantly for legitimate reasons.
references:
  - https://attack.mitre.org/techniques/T1218/010/
  - https://attack.mitre.org/techniques/T1218/011/
  - https://lolbas-project.github.io/
author: Manea Al-Shabrain
date: 2026-07-14
tags:
  - attack.defense_evasion
  - attack.t1218
  - attack.t1218.010
  - attack.t1218.011
logsource:
  product: windows
  category: process_creation
detection:
  selection_certutil:
    Image|endswith: '\certutil.exe'
    CommandLine|contains:
      - 'urlcache'
      - 'verifyctl'
      - ' -decode'
      - ' -encode'
      - 'split'
  selection_regsvr32:
    Image|endswith: '\regsvr32.exe'
    CommandLine|contains:
      - 'scrobj'
      - '/i:http'
      - '/i:ftp'
      - '.sct'
  selection_rundll32:
    Image|endswith: '\rundll32.exe'
    CommandLine|contains:
      - 'javascript:'
      - 'vbscript:'
      - 'mshtml'
      - 'url.dll,OpenURL'
      - 'shell32.dll,Control_RunDLL http'
  condition: 1 of selection_*
fields:
  - Image
  - ParentImage
  - CommandLine
falsepositives:
  - certutil is used for legitimate certificate management. Scope by unusual ParentImage (Office apps, script hosts) or non-admin users if the base rate is high in your environment.
level: high
