title: LSASS Process Access With Credential-Dumping Rights
id: c4e1a7b3-2d9f-4e60-8a15-7b3c9d0e2f18
status: experimental
description: |
  Detects a process opening a handle to lsass.exe with access rights that permit
  reading process memory (e.g. 0x1010, 0x1410, 0x143a). Credential-dumping tools such
  as Mimikatz, comsvcs.dll MiniDump and procdump request these rights to extract
  plaintext passwords, hashes and Kerberos tickets from LSASS.
references:
  - https://attack.mitre.org/techniques/T1003/001/
  - https://redcanary.com/threat-detection-report/techniques/lsass-memory/
author: Manea Al-Shabrain
date: 2026-07-14
tags:
  - attack.credential_access
  - attack.t1003.001
logsource:
  product: windows
  category: process_access
detection:
  selection:
    TargetImage|endswith: '\lsass.exe'
    GrantedAccess:
      - '0x1010'
      - '0x1410'
      - '0x1418'
      - '0x1438'
      - '0x143a'
      - '0x1f0fff'
      - '0x1f1fff'
      - '0x1f2fff'
      - '0x1fffff'
  filter_system:
    SourceImage|endswith:
      - '\wininit.exe'
      - '\lsass.exe'
      - '\MsMpEng.exe'
      - '\svchost.exe'
      - '\csrss.exe'
  condition: selection and not filter_system
fields:
  - SourceImage
  - GrantedAccess
  - CallTrace
falsepositives:
  - Endpoint security agents (EDR/AV) and some Windows components access LSASS legitimately. Tune the filter with the exact SourceImage paths of your security tooling instead of removing the detection.
level: high
